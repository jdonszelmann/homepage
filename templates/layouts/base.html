<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />

    <script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta4/dist/htmx.min.js" integrity="sha384-aWZK1NtOs/aWb/+YZdTM8q2JkWEshlMc9mgZ189numT9bwFhyAyYEoO4nO/2dTXt" crossorigin="anonymous"></script>

    {% block head %}{% endblock %}

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/static/style/site-layout.css" />
    {% if gay %}
    <link rel="stylesheet" href="/static/style/gay.css" />
    {% endif %}
    <link rel="stylesheet" href="/static/style/contents.css" />
    <link rel="stylesheet" href="/static/style/components.css" />

    <title>
        {% block title %}{% endblock %}
    </title>
    <style>
        @keyframes detect-scroll {

            from,
            to {
                --can-scroll: ;
            }
        }
    </style>

    <script>
        addEventListener("DOMContentLoaded", (event) => { 
            for (const elem of document.querySelectorAll("time")) {
                const value = elem.getAttribute("datetime");
                const date = new Date(parseInt(value) * 1000);
                elem.innerText = date.toLocaleString(undefined, {
                    year: "numeric",
                    month: "short",
                    day: "2-digit",
                    hour: "2-digit",
                    minute: "2-digit",
                    hour12: false,
                });
            }
        })
    </script>
</head>

<body class="{% if gay %}gay{% endif %} {% if wide %}wide{% endif %}">
    <nav>
        <div class="menu sans">
            <a href="/">Home</a>
            {% if let Some(user) = user %}
            <a href="/dashboard">Dashboard</a>
            {% endif %}
            <a href="/blog">Blog</a>
            <a href="/rss.xml">RSS</a>
            {% block menu %}{% endblock %}
        </div>

        <div class="space only-wide"></div>

        {% block nav %}{% endblock %}
    </nav>
    <main>
        {% block main %}{% endblock %}
    </main>
</body>

</html>
