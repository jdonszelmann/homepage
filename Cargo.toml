[package]
name = "homepage"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = {version = "0.8", features = ["macros"]}
axum-macros = { version = "0.5.0-rc.1" }
tower-http = {version = "0.6", features = ["auth", "trace", "fs"]}
tower-sessions = "0.15"
tower = "0.5"
askama = "0.16"
sqlx = { version = "0.9", features = [ "runtime-tokio", "tls-native-tls", "uuid", "json", "postgres", "migrate", "time" ] }
axum-oidc = {version = "1.0.0-dev-2"}

url = "2"
uuid = {version = "1", features = ["v4"]}
time = "0.3"

log = "0.4"
tracing = "0.1"
tracing-subscriber = {version = "0.3", features = ["fmt", "env-filter"]}
tracing-tree = "0.4"
dotenvy = "0.15"
clap = {version = "4.6.1", features=["derive", "env"]}

tokio = {version = "1", features = ["full"]}
serde = {version = "1", features = ["derive"]}
serde_json = {version = "1", features = ["arbitrary_precision"]}
color-eyre = "0.6"
async-trait = "0.1"

[dev-dependencies]
axum-test = "20"
